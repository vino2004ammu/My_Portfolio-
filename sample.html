     <link rel="stylesheet" href="sample.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>  
     <header class="navbar navbar-expand-lg bg-dark" > 
           <div class="container">
                <div class="navbar-brand ps-5">
                     <h4 class="navigation ps-5 text-white">VINOTHINI</h4>
                </div>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                         <span class="navbar-toggler-icon"></span>
                    </button>
                <div class="collapse navbar-collapse pe-5" id="navbarNav">
                     <ul class="navbar-nav ms-auto d-flex gap-2 justify-content-center pe-5 me-5 fs-5">
                            <li class="nav-item"><a class="nav-link text-white"href="index.html">Home</a></li>
                            <li class="nav-item"><a class="nav-link text-white"href="web.html">About</a></li>
                            <li class="nav-item"><a class="nav-link text-white"href="sample.html">Contact Us</a></li>
                     </ul>
                </div>
            </div>
      </header>
      <section id="contact" class="container mt-5">
         <h2 class="text-center mb-4">Contact Me</h2>
         <div class="row justify-content-center">
           <div class="col-md-6">
              <form id="contactForm">
                <div class="mb-3">
                    <input type="text" id="name" class="form-control fs-5" placeholder="Your Name">
                </div>
                <div class="mb-3">
                    <input type="email" id="email" class="form-control fs-5" placeholder="Your Email">
                </div>
                <div class="mb-3">
                    <textarea id="message" class="form-control fs-5" rows="4" placeholder="Your Message"></textarea>
                </div>
                <button class="btn btn-primary w-100 fs-5">Send Message</button>
              </form>
            </div>
          </div>
      </section><br><br><br>
      <footer class="container text-center fs-5">
        <p>What will your verse be?</p>
        <p>&copy; 2025 Vinothini I | Web Developer</p>
      </footer>   
    <script>
          document.getElementById("contactForm").addEventListener("submit", function(e) {
              e.preventDefault(); 

              let name = document.getElementById("name").value;
              let email = document.getElementById("email").value;
              let message = document.getElementById("message").value;

              let formData = {
                  name: name,
                  email: email,
                  message: message
              };
              localStorage.setItem("contactData", JSON.stringify(formData));
              alert("Message saved successfully!");
              document.getElementById("contactForm").reset();
          });
    </script>
    
</body>
</html>
